// 📤 export excel
function exportExcel(){

  const rows = [];

  Object.values(allLogs).forEach(u=>{
    rows.push({
      CID: u.cid,
      ชื่อ: u.name,
      Role: u.role,
      เวลา: u.loginTime
    });
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Logs");

  XLSX.writeFile(wb, "login_logs.xlsx");
}
